name: master

concurrency: ${{ github.workflow }}/${{ github.ref }}

on:
  workflow_dispatch:
  push:
    branches:
      - master
  schedule:
    - cron: '16 5 * * *'

jobs:
  ci:
    permissions:
      contents: read

    uses: ./.github/workflows/ci.yml

  publish-repo:
    needs: ci
    runs-on: ubuntu-24.04

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
